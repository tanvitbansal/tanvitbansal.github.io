<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tanvi Bansal</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8f7f3;
        color: #18181b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(100%, 720px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 7.5rem);
        font-weight: 700;
        line-height: 0.95;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tanvi Bansal</h1>
    </main>
  </body>
</html>
